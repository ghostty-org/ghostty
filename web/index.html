  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100%;
      background: #1a1a2e;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 24px 64px;
    }

    /* --- Scene container --- */
    .scene {
      width: 100%;
      cursor: pointer;
      padding: 48px 32px 40px;
      user-select: none;
    }

    /* --- Ghost grid (pyramid) --- */
    .ghosts {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 48px;
    }

    .ghost-row {
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .ghost {
      width: 100px;
      height: 100px;
      opacity: 0;
    }

    .ghost svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* --- Entrance: each ghost flies in from a unique direction --- */
    .animate .ghost {
      animation: float 2.5s ease-in-out infinite alternate;
    }

    .animate .g0 { animation: entrance-g0 0.8s ease-out forwards, float-g0 2.4s ease-in-out 1.5s infinite alternate; }
    .animate .g1 { animation: entrance-g1 0.8s 1.8s ease-out forwards, float-g1 2.8s ease-in-out 3.0s infinite alternate; }
    .animate .g2 { animation: entrance-g2 0.8s 2.0s ease-out forwards, float-g2 3.1s ease-in-out 3.2s infinite alternate; }
    .animate .g3 { animation: entrance-g3 0.8s 2.2s ease-out forwards, float-g3 2.6s ease-in-out 3.4s infinite alternate; }
    .animate .g4 { animation: entrance-g4 0.8s 2.4s ease-out forwards, float-g4 3.3s ease-in-out 3.6s infinite alternate; }
    .animate .g5 { animation: entrance-g5 0.8s 2.6s ease-out forwards, float-g5 2.9s ease-in-out 3.8s infinite alternate; }
    .animate .g6 { animation: entrance-g6 0.8s 2.8s ease-out forwards, float-g6 3.5s ease-in-out 4.0s infinite alternate; }
    .animate .g7 { animation: entrance-g7 0.8s 3.0s ease-out forwards, float-g7 2.7s ease-in-out 4.2s infinite alternate; }

    @keyframes entrance-g0 { from { transform: translateY(-300px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes entrance-g1 { from { transform: translate(-300px, -150px); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }
    @keyframes entrance-g2 { from { transform: translate(300px, -150px); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }
    @keyframes entrance-g3 { from { transform: translate(-400px, 0); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }
    @keyframes entrance-g4 { from { transform: translateY(-350px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes entrance-g5 { from { transform: translate(400px, 0); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }
    @keyframes entrance-g6 { from { transform: translate(-250px, 200px); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }
    @keyframes entrance-g7 { from { transform: translate(250px, 200px); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }

    @keyframes float-g0 { from { transform: translate(0, -5px); }   to { transform: translate(1px, 4px); } }
    @keyframes float-g1 { from { transform: translate(2px, -3px); } to { transform: translate(-2px, 5px); } }
    @keyframes float-g2 { from { transform: translate(-1px, -4px); } to { transform: translate(2px, 3px); } }
    @keyframes float-g3 { from { transform: translate(1px, -6px); } to { transform: translate(-1px, 3px); } }
    @keyframes float-g4 { from { transform: translate(-2px, -3px); } to { transform: translate(1px, 5px); } }
    @keyframes float-g5 { from { transform: translate(0, -4px); }   to { transform: translate(-2px, 4px); } }
    @keyframes float-g6 { from { transform: translate(2px, -5px); } to { transform: translate(-1px, 4px); } }
    @keyframes float-g7 { from { transform: translate(-1px, -3px); } to { transform: translate(2px, 6px); } }

    /* --- Terminal text --- */
    .terminal {
      font-family: 'SFMono-Regular', 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      line-height: 2;
      color: #E0E0E0;
      width: fit-content;
      margin: 0 auto;
    }

    .line {
      overflow: hidden;
      white-space: nowrap;
      width: 0;
      border-right: 2px solid transparent;
    }

    /* Typing animation per line */
    .animate .line-1 {
      animation: type-line1 0.6s steps(16) 1.0s forwards, blink-caret 0.6s step-end 1.0s 1;
      border-right-color: transparent;
    }

    .animate .line-1.caret-visible {
      border-right-color: #E0E0E0;
    }

    .animate .line-2 {
      animation: type-line2 0.9s steps(25) 4.2s forwards, blink-caret 0.6s step-end 4.2s 1;
      border-right-color: transparent;
    }

    .animate .line-2.caret-visible {
      border-right-color: #E0E0E0;
    }

    .animate .line-3 {
      animation: type-line3 1.5s steps(52) 5.5s forwards, blink-caret 0.53s step-end 5.5s infinite;
      border-right-color: transparent;
    }

    .animate .line-3.caret-visible {
      border-right-color: #E0E0E0;
    }

    @keyframes type-line1 {
      from { width: 0; }
      to   { width: 16ch; }
    }

    @keyframes type-line2 {
      from { width: 0; }
      to   { width: 25ch; }
    }

    @keyframes type-line3 {
      from { width: 0; }
      to   { width: 52ch; }
    }

    @keyframes blink-caret {
      50% { border-color: transparent; }
    }

    .terminal a {
      color: #E0E0E0;
      text-decoration: none;
      cursor: pointer;
    }

    .terminal a:hover {
      text-decoration: underline;
    }

    /* --- Scatter (click to explode) --- */
    .scatter .ghost {
      animation: none !important;
      transition: transform 0.6s ease-in, opacity 0.4s ease-in;
    }

    .scatter .g0 { transform: translate(0, -600px) scale(0.5); opacity: 0; }
    .scatter .g1 { transform: translate(-500px, -400px) scale(0.5); opacity: 0; }
    .scatter .g2 { transform: translate(500px, -400px) scale(0.5); opacity: 0; }
    .scatter .g3 { transform: translate(-600px, 0) scale(0.5); opacity: 0; }
    .scatter .g4 { transform: translate(0, -550px) scale(0.5); opacity: 0; }
    .scatter .g5 { transform: translate(600px, 0) scale(0.5); opacity: 0; }
    .scatter .g6 { transform: translate(-400px, 500px) scale(0.5); opacity: 0; }
    .scatter .g7 { transform: translate(400px, 500px) scale(0.5); opacity: 0; }

    .scatter .terminal {
      transition: opacity 0.4s ease-in;
      opacity: 0;
    }

    /* --- Footer --- */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.25);
    }

    footer a {
      color: rgba(255, 255, 255, 0.25);
      transition: color 0.2s;
    }

    footer a:hover {
      color: rgba(255, 255, 255, 0.5);
    }

    footer svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    /* --- Download CTA --- */
    .cta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding-top: 32px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .cta-download {
      display: inline-block;
      background: #ffffff;
      color: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
      letter-spacing: -0.01em;
      transition: opacity 0.15s;
    }

    .cta-download:hover {
      opacity: 0.85;
    }

    .cta-meta {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      line-height: 1.6;
    }

    .cta-meta a {
      color: rgba(255, 255, 255, 0.4);
      text-decoration: underline;
      transition: color 0.2s;
    }

    .cta-meta a:hover {
      color: rgba(255, 255, 255, 0.65);
    }

    /* --- Mobile --- */
    @media (max-width: 480px) {
      body { padding: 16px; }
      .scene { padding: 32px 20px 28px; }
      .ghost { width: 64px; height: 64px; }
      .ghost-row { gap: 10px; }
      .ghosts { gap: 10px; margin-bottom: 28px; }
      .terminal { font-size: 13px; }
      footer { padding: 12px 16px; font-size: 12px; }
      .cta { padding-top: 24px; }
      .cta-download { font-size: 14px; padding: 11px 20px; }
    }
  </style>
</head>

  <script>
    const scene = document.querySelector('.scene');
    const ghLink = document.querySelector('.gh-link');
    const lines = document.querySelectorAll('.line');
    let animating = false;

    // Activate caret visibility at the right times
    function activateCarets() {
      const line1 = document.querySelector('.line-1');
      const line2 = document.querySelector('.line-2');
      const line3 = document.querySelector('.line-3');

      // Line 1 caret appears when it starts typing (1s), disappears when line 2 starts (4.2s)
      setTimeout(() => { line1.classList.add('caret-visible'); }, 1000);
      setTimeout(() => { line1.classList.remove('caret-visible'); }, 4200);

      // Line 2 caret appears when it starts typing (4.2s), disappears when line 3 starts (5.5s)
      setTimeout(() => { line2.classList.add('caret-visible'); }, 4200);
      setTimeout(() => { line2.classList.remove('caret-visible'); }, 5500);

      // Line 3 caret appears when it starts typing and stays (blinking)
      setTimeout(() => { line3.classList.add('caret-visible'); }, 5500);
    }

    // Initial caret activation
    activateCarets();

    // Click to scatter
    scene.addEventListener('click', () => {
      if (animating) return;
      animating = true;
      scene.classList.add('scatter');
    });

    // After scatter transition ends → restart the whole sequence
    scene.addEventListener('transitionend', (e) => {
      if (!scene.classList.contains('scatter')) return;
      // Only react to ghost transitions (not terminal opacity)
      if (!e.target.classList.contains('ghost')) return;

      // Remove scatter
      scene.classList.remove('scatter');

      // Clear caret classes
      document.querySelector('.line-1').classList.remove('caret-visible');
      document.querySelector('.line-2').classList.remove('caret-visible');
      document.querySelector('.line-3').classList.remove('caret-visible');

      // Reset animations: remove animate, force reflow, re-add
      scene.classList.remove('animate');
      void scene.offsetWidth;
      scene.classList.add('animate');

      // Re-activate carets for the new cycle
      activateCarets();

      animating = false;
    });

    // Prevent scatter when clicking the GitHub link
    ghLink.addEventListener('click', (e) => e.stopPropagation());
  </script>
