name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request: {}
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Zig build + test (Linux, no GUI dependencies needed)
  # ---------------------------------------------------------------------------
  zig-build:
    name: Zig Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build (skip macOS app bundle)
        run: zig build -Demit-macos-app=false

      - name: Run popup unit tests
        run: zig test src/apprt/popup.zig

  # ---------------------------------------------------------------------------
  # Zig format check
  # ---------------------------------------------------------------------------
  zig-fmt:
    name: Zig Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Check formatting
        run: zig fmt --check src/

  # ---------------------------------------------------------------------------
  # macOS app build (requires Xcode 26 + nushell)
  # Runs on self-hosted runner — adjust the label to match your setup.
  # ---------------------------------------------------------------------------
  macos-build:
    name: macOS Build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Zig library
        run: zig build -Demit-macos-app=false

      - name: Build macOS app
        run: nu macos/build.nu

      - name: Run macOS tests
        run: nu macos/build.nu --action test
