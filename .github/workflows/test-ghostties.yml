# Test workflow for the Ghostties fork.
#
# The upstream `test.yml` workflow is gated on `github.repository ==
# 'ghostty-org/ghostty'` and runs on Namespace Labs runners we don't have
# access to. This workflow covers the fork-only surfaces:
#
#   - Swift Package at `cli/` (gt CLI + ghostties-mcp server + GhosttiesCore)
#   - macOS app tests for TaskStore + TaskFileWatcher + TaskFixtureParser
#
# Runs on macos-latest (Apple Silicon) because GhosttyKit.xcframework is
# arm64-only. The xcframework is built fresh from source via Zig
# (gitignored — not committed to the repo). Signing / notarization
# happens in the separate release workflow (`ghostties-release.yml`).

name: Test (Ghostties fork)

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Swift Package — GhosttiesCore + gt + ghostties-mcp
  # ---------------------------------------------------------------------------
  swift-package:
    name: Swift Package (cli/)
    # Skip on the upstream repo; upstream test.yml covers upstream code.
    if: github.repository != 'ghostty-org/ghostty'
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: swift --version
        run: swift --version

      # Serial. Locally `swift test --parallel` runs in ~4s but on macos-latest
      # GH Actions runners the parallel worker scheduler hangs after running
      # ~54 of 62 tests — never tracked down which worker stalls. Serial still
      # runs the full suite in ~1s locally and reliably finishes on CI.
      - name: swift test
        working-directory: cli
        run: swift test

  # ---------------------------------------------------------------------------
  # macOS App — Ghostties Xcode project tests
  # ---------------------------------------------------------------------------
  macos-app:
    name: macOS App (xcodebuild test)
    if: github.repository != 'ghostty-org/ghostty'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Xcode version
        run: xcodebuild -version

      # Install Zig 0.15.2 (matches build.zig.zon minimum_zig_version).
      # Required to build GhosttyKit.xcframework from source — the
      # xcframework is gitignored, not vendored.
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      # Cache Zig package downloads + build artifacts. Keyed on the lock
      # file so deps changes invalidate the cache; falls back to any prior
      # cache for incremental rebuilds.
      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            zig-out
            .zig-cache
          key: zig-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-${{ runner.os }}-

      # Build the xcframework only — skip the macOS app build, Xcode does
      # that. Produces macos/GhosttyKit.xcframework which the Xcode project
      # links against.
      - name: Build GhosttyKit.xcframework
        run: zig build -Demit-macos-app=false

      # CEF (Chromium Embedded Framework) for the embedded browser feature.
      # ~700MB unpacked. Cache aggressively — the version doesn't change often.
      # Bump the cache key suffix when scripts/download-cef.sh changes (its
      # version-resolution logic).
      - name: Cache CEF
        id: cache-cef
        uses: actions/cache@v4
        with:
          path: |
            vendor/cef
            vendor/cef-build
          key: cef-${{ runner.os }}-${{ hashFiles('scripts/download-cef.sh', 'scripts/build-cef-wrapper.sh') }}-v1

      - name: Download CEF
        if: steps.cache-cef.outputs.cache-hit != 'true'
        run: bash scripts/download-cef.sh

      - name: Build CEF wrapper
        if: steps.cache-cef.outputs.cache-hit != 'true'
        run: bash scripts/build-cef-wrapper.sh

      # Pin arm64 — GhosttyKit.xcframework is arm64-only. Without this the
      # Xcode CLI will try to build universal and fail on linker misses.
      # (Xcode GUI masks this by defaulting ONLY_ACTIVE_ARCH=YES for Debug.)
      #
      # Build-only on CI. The full `xcodebuild test` invocation hangs the
      # XCTest host (`Ghostties Dev.app`) ~6 min before xcodebuild gives up
      # with "test runner hung before establishing connection". Root cause is
      # heavy `ghostty_init` / `Ghostty.App(configPath:)` work that runs in
      # main.swift + AppDelegate property init — _before_ XCTest can load —
      # in a headless GH Actions runner without a window-server session. The
      # AppDelegate XCTest guard (skips startup work post-launch) is in place
      # for the eventual fix; the proper fix is to either lazy-init those or
      # make the test target not require the app as host. Until then, build-
      # only here catches build breaks; Sean runs the tests locally with Cmd+U.
      - name: Build Ghostties (build-only)
        working-directory: macos
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme Ghostties \
            -configuration Debug \
            -destination 'platform=macOS' \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64 \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO
